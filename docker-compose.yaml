#   STACK NETWORK    ---------------------------------------------------------------#

networks:

    #   External Private network for all stack services    --------------------------#

    stack_private_network:
        #
        #   SSH command to create the Docker network: docker network create --driver bridge stack_private_network --subnet=172.16.0.0/16
        #
        driver: bridge
        external: true

    # -------------------------------------------------------------------------------#

    #   Public network for McRouter    ----------------------------------------------#

    #mcrouter_public_network:
        #
        #   Note: This network is intended for public access through a proxy server.
        #
        #external: true

    # -------------------------------------------------------------------------------#

    #   Internal Private network for memcached services    --------------------------#

    memcached_private_network:
        #
        #   Setup Network Driver in .env or use default bridge
        #
        driver: ${MEMCACHED_PRIVATE_DRIVER:-bridge}
        external: false

    # -------------------------------------------------------------------------------#

    #   Internal Private network for mcrouter services    ---------------------------#

    mcrouter_private_network:
        #
        #   Setup Network Driver in .env or use default bridge
        #
        driver: ${MCROUTER_PRIVATE_DRIVER:-bridge}
        external: false

# ----------------------------------------------------------------------------------#

#   STACK SERVICES    --------------------------------------------------------------#

services:

    #   MEMCACHED SERVER 1    ------------------------------------------------------#

    memcached1:
        image: memcached:${MEMCACHED_SERVER_VERSION:-latest}
        ulimits:
            #
            #   Set memory lock limits
            #

            memlock: ${MEMCACHED_MEMLOCK:-1}

        ports:
            #
            #   Port mapping for Memcached
            #

            - "${LOCAL_LISTEN_ADDR:-127.0.0.1}:11212:11211"

        volumes:
            #
            #   Local time
            #

            - /etc/localtime:/etc/localtime:ro

        networks:
            #
            #   Connect to the private network
            #

            memcached_private_network:

        extra_hosts:
            #
            #   Add extra host entries for internal resolution
            #

            - "host.docker.internal:host-gateway"
            - "${LOCAL_LISTEN_ADDR:-127.0.0.1}:host-gateway"

            #
            #   Setup MEMCACHED_HOSTNAME variable in .env file
            #

            - "${MEMCACHED_HOSTNAME:-localhost}:${LOCAL_LISTEN_ADDR:-127.0.0.1}"


    # ------------------------------------------------------------------------------#

    #   MEMCACHED SERVER 2    ------------------------------------------------------#

    memcached2:
        image: memcached:${MEMCACHED_SERVER_VERSION:-latest}
        ulimits:
            #
            #   Set memory lock limits
            #

            memlock: ${MEMCACHED_MEMLOCK:-1}

        ports:
            #
            #   Port mapping for Memcached
            #

            - "${LOCAL_LISTEN_ADDR:-127.0.0.1}:11213:11211"

        volumes:
            #
            #   Local time
            #

            - /etc/localtime:/etc/localtime:ro

        networks:
            #
            #   Connect to the private network
            #

            memcached_private_network:

        extra_hosts:
            #
            #   Add extra host entries for internal resolution
            #

            - "host.docker.internal:host-gateway"
            - "${LOCAL_LISTEN_ADDR:-127.0.0.1}:host-gateway"

            #
            #   Setup MEMCACHED_HOSTNAME variable in .env file
            #

            - "${MEMCACHED_HOSTNAME:-localhost}:${LOCAL_LISTEN_ADDR:-127.0.0.1}"


    # ------------------------------------------------------------------------------#

    #   MEMCACHED SERVER 3    ------------------------------------------------------#

    memcached3:
        image: memcached:${MEMCACHED_SERVER_VERSION:-latest}
        ulimits:
            #
            #   Set memory lock limits
            #

            memlock: ${MEMCACHED_MEMLOCK:-1}

        ports:
            #
            #   Port mapping for Memcached
            #

            - "${LOCAL_LISTEN_ADDR:-127.0.0.1}:11214:11211"

        volumes:
            #
            #   Local time
            #

            - /etc/localtime:/etc/localtime:ro

        networks:
            #
            #   Connect to the private network
            #

            memcached_private_network:

        extra_hosts:
            #
            #   Add extra host entries for internal resolution
            #

            - "host.docker.internal:host-gateway"
            - "${LOCAL_LISTEN_ADDR:-127.0.0.1}:host-gateway"

            #
            #   Setup MEMCACHED_HOSTNAME variable in .env file
            #

            - "${MEMCACHED_HOSTNAME:-localhost}:${LOCAL_LISTEN_ADDR:-127.0.0.1}"


    # ------------------------------------------------------------------------------#

    #   MCROUTER1    ---------------------------------------------------------------#

    mcrouter1:
        image: coozila/mcrouter:${MCROUTER_VERSION:-40.0.0}
        container_name: mcrouter-${MCROUTER_VERSION:-40.0.0}.${MCROUTER1_HOSTNAME:-mcrouter1}
        platform: linux/amd64
        hostname: ${MCROUTER_HOSTNAME:-localhost}
        restart: always
        links:
            #
            #   Links to Memcached instances
            #

            - memcached1:memcached1
            - memcached2:memcached2
            - memcached3:memcached3

        command: mcrouter --config-file=/etc/mcrouter/mcrouter_config.json -p 11211
        ports:
            #
            #   Port mapping for Mcrouter
            #

            - "${LOCAL_LISTEN_ADDR:-127.0.0.1}:11211:11211"

        volumes:
            #
            #   Local time
            #

            - /etc/localtime:/etc/localtime:ro

            #
            #   Map config file
            #

            #- ./config/basic_mcrouter_config.json:/etc/mcrouter/mcrouter_config.json

            #
            #   Map failover config file 
            #

            - ./config/basic_mcrouter_failover_config.json:/etc/mcrouter/mcrouter_config.json

        networks:
            #
            #   Connect to public and  private networka
            #

            - stack_private_network
            - memcached_private_network
            # - mcrouter_public_network
            - mcrouter_private_network

        extra_hosts:
            #
            #   Add extra host entries for internal resolution
            #

            - "host.docker.internal:host-gateway"
            - "${LOCAL_LISTEN_ADDR:-127.0.0.1}:host-gateway"

            #
            #   Setup MCROUTER_HOSTNAME variable in .env file
            #

            - "${MCROUTER1_HOSTNAME:-mcrouter1}:${LOCAL_LISTEN_ADDR:-127.0.0.1}"


# ----------------------------------------------------------------------------------#
