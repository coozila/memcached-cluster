    mcrouter1:
        image: coozila/mcrouter:${MCROUTER_VERSION:-40.0.0}
        container_name: mcrouter1-${MCROUTER_VERSION:-40.0.0}
        platform: linux/amd64
        hostname: ${MCROUTER_HOSTNAME:-localhost}
        restart: always
        links:
            #
            #   Links to Memcached instances
            #
            - memcached1:memcached1
            - memcached2:memcached2
            - memcached3:memcached3
            - memcached4:memcached4
            - memcached5:memcached5
            - memcached6:memcached6
            - memcached7:memcached7
            - memcached8:memcached8
            - memcached9:memcached9
        command: mcrouter --config-file=/etc/mcrouter/mcrouter_config.json -p 11211
        ports:
            #
            #   Port mapping for Mcrouter
            #
            - "${LOCAL_LISTEN_ADDR:-127.0.0.1}:11211:11211"

        volumes:
            #
            #   Local time
            #

            - /etc/localtime:/etc/localtime:ro

            #
            #   Map config file
            #

            #- ./config/basic_mcrouter_config.json:/etc/mcrouter/mcrouter_config.json

            #
            #   Map failover config file 
            #

            - ./config/basic_mcrouter_failover_config.json:/etc/mcrouter/mcrouter_config.json

        networks:
